<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的笔记</title>
  <meta name="description" content="个人分类静态笔记 — 生活 / 学术 / 职业">
  <link rel="stylesheet" href="assets/style.css">
  <script src="assets/site.js" defer></script>
  <script src="assets/manifest.js" defer></script>
  <script src="assets/catalog.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="index.html">📚 我的笔记</a>
      <div class="header-actions">
        <button class="theme-toggle" type="button" aria-label="切换暗色模式">🌙</button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>个人笔记库</h1>
      <p>点击进入分类文件夹，在里面创建子文件夹、页面或上传文件</p>
    </section>

    <div class="search-box">
      <input type="search" id="note-search" placeholder="搜索笔记标题或关键词…" autocomplete="off">
    </div>

    <div id="search-results" class="search-results" hidden></div>

    <div class="category-grid category-grid--folders" id="category-grid">
      <p class="catalog-loading">正在加载目录…</p>
    </div>

    <p class="private-hint">🔒 私密笔记不在此列出，请通过书签访问私密区入口。</p>
  </main>

  <footer class="site-footer">
    <p>托管于 GitHub Pages · 纯静态站点</p>
  </footer>
</body>
</html>
